<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="32" x2="64" y2="32" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Top bar (terminal chrome) -->
  <rect x="10" y="11" width="44" height="6" rx="2" fill="white" fill-opacity="0.05"/>
  <!-- Traffic lights -->
  <circle cx="16" cy="14" r="1.8" fill="#ff5f57" opacity="0.8"/>
  <circle cx="22" cy="14" r="1.8" fill="#febc2e" opacity="0.8"/>
  <circle cx="28" cy="14" r="1.8" fill="#28c840" opacity="0.8"/>

  <!-- Terminal body border -->
  <rect x="10" y="11" width="44" height="40" rx="4" stroke="url(#glow)" stroke-width="1.5" fill="none" opacity="0.6" filter="url(#outer-glow)"/>

  <!-- Prompt   >_ symbol -->
  <!-- Caret ">" -->
  <polyline points="16,35 22,40 16,45" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#blur-glow)"/>
  <!-- Underscore cursor -->
  <rect x="25" y="43" width="12" height="2.5" rx="1.2" fill="url(#glow)" filter="url(#blur-glow)"/>

  <!-- Blinking dot (static) -->
  <circle cx="50" cy="40" r="1.5" fill="#a855f7" opacity="0.7"/>

  <!-- Bottom gradient line -->
  <rect x="10" y="49" width="44" height="2" rx="1" fill="url(#glow)" opacity="0.4"/>
</svg>
